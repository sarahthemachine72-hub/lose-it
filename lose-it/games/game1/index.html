<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Space Raiders Breakout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hud">
      <div>
        <h1 class="title">Space Raiders Breakout</h1>
        <p class="hint">Move: mouse/trackpad/touch. Tap/click to start. Press R to restart.</p>
      </div>
      <div class="stats">
        <div class="stat">Lives: <span id="lives">5</span></div>
        <div class="stat">Time: <span id="timer">00:00</span></div>
        <button class="btn btn--small" id="restartBtn" type="button">Restart</button>
        <button class="btn btn--small btn--ghost" id="hudExitBtn" type="button">Exit</button>
      </div>
    </header>

    <section class="stage">
      <canvas id="game"></canvas>

      <div class="overlay" id="overlay">
        <div class="card">
          <div class="cardTitle" id="overlayTitle">Tap / Click to Start</div>
          <div class="cardSub" id="overlaySubtitle">Destroy all boxes to win.</div>
          <div class="overlayStats" id="overlayStats"></div>
          <div class="overlayMeter" id="overlayMeter" aria-hidden="true">
            <div class="overlayMeter__label">FAILOMETER</div>
            <div class="overlayMeter__wrap">
              <svg class="overlayMeter__svg" viewBox="0 0 220 130" aria-hidden="true">
                <path
                  class="overlayMeter__bg"
                  d="M 30 110 A 80 80 0 0 1 190 110"
                  pathLength="100"
                />
                <path
                  id="overlayMeterProgress"
                  class="overlayMeter__progress"
                  d="M 30 110 A 80 80 0 0 1 190 110"
                  pathLength="100"
                />
              </svg>
              <div class="overlayMeter__value"><span id="overlayMeterScore">0</span><small>/100</small><div class="overlayMeter__tier" id="overlayMeterTier">not a loser</div></div>
            </div>
          </div>
          <div class="cardFeatures" id="overlayFeatures"></div>
          <div class="cardActions">
            <button class="btn" id="startBtn">Start</button>
            <button class="btn btn--ghost is-hidden" id="restoreBtn" type="button">Restore Previous</button>
            <button class="btn btn--ghost is-hidden" id="exitBtn" type="button">Exit</button>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer">
      Tip: on phones, drag anywhere on the game area to move the paddle.
    </footer>
  </main>

  <script src="game.js"></script>
</body>
</html>
